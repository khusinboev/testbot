<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DTM Admin — Kirish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Onest:wght@400;600;700;800&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f14; --surface: #161820; --surface2: #1e2130;
      --border: #2a2d3a; --accent: #4f6ef7; --accent2: #7c3aed;
      --text: #e8eaf0; --muted: #6b7280; --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Onest', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    /* Background grid */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(79,110,247,.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(79,110,247,.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }
    /* Glow */
    body::after {
      content: '';
      position: fixed;
      top: -20%; left: 50%; transform: translateX(-50%);
      width: 600px; height: 400px;
      background: radial-gradient(ellipse, rgba(79,110,247,.12) 0%, transparent 70%);
      pointer-events: none;
    }
    .login-wrap {
      width: 100%; max-width: 400px;
      padding: 20px;
      position: relative; z-index: 1;
    }
    .login-logo {
      text-align: center; margin-bottom: 32px;
    }
    .login-logo .brand {
      font-size: 28px; font-weight: 800;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      letter-spacing: -1px;
    }
    .login-logo .sub {
      font-size: 12px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 4px;
    }
    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px;
    }
    .login-title {
      font-size: 18px; font-weight: 700;
      margin-bottom: 24px;
    }
    .form-group { margin-bottom: 16px; }
    .form-label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--muted); margin-bottom: 6px; letter-spacing: .3px;
    }
    .form-control {
      width: 100%; padding: 11px 14px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'Onest', sans-serif; font-size: 14px;
      transition: border-color .15s;
    }
    .form-control:focus {
      outline: none; border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,110,247,.15);
    }
    .btn-login {
      width: 100%; padding: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none; border-radius: 10px;
      color: #fff; font-family: 'Onest', sans-serif;
      font-size: 14px; font-weight: 700;
      cursor: pointer; margin-top: 8px;
      transition: opacity .15s;
    }
    .btn-login:hover { opacity: .9; }
    .error-msg {
      background: rgba(239,68,68,.1);
      border: 1px solid rgba(239,68,68,.3);
      color: var(--danger);
      padding: 10px 14px; border-radius: 8px;
      font-size: 13px; margin-bottom: 16px;
    }
    .hint {
      margin-top: 16px; text-align: center;
      font-size: 12px; color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-logo">
      <div class="brand">DTM Admin</div>
      <div class="sub">Boshqaruv paneli</div>
    </div>

    <div class="login-card">
      <div class="login-title">🔐 Tizimga kirish</div>

      {% if error %}
        <div class="error-msg">❌ {{ error }}</div>
      {% endif %}

      <form method="POST">
        <div class="form-group">
          <label class="form-label">Login</label>
          <input type="text" name="username" class="form-control"
                 placeholder="admin" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label">Parol</label>
          <input type="password" name="password" class="form-control"
                 placeholder="••••••••" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn-login">Kirish →</button>
      </form>

      <div class="hint">DTM Test Bot · Admin Panel</div>
    </div>
  </div>
</body>
</html>
